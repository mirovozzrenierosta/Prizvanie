<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Поиск призвания — дополнительные матрицы</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1C2B5E; --navy-dark:#121d42; --gold:#C9A227; --gold-light:#E8CC78;
  --off-white:#F7F6F2; --white:#fff; --gray-700:#3D3D3D; --gray-400:#9B9B9B; --gray-100:#EEECEA;
  --font-display:'Playfair Display',Georgia,serif; --font-body:'Montserrat',system-ui,sans-serif;
}
html,body{height:100%}
body{font-family:var(--font-body);color:var(--gray-700);background:var(--navy);line-height:1.6;-webkit-font-smoothing:antialiased;
  min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;}
@media (prefers-reduced-motion: reduce){ *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;} }

.app{width:100%;max-width:640px;background:var(--white);border-radius:4px;box-shadow:0 30px 80px rgba(0,0,0,.35);overflow:hidden;position:relative;min-height:560px;display:flex;flex-direction:column}
.brandbar{background:var(--navy);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--gold)}
.brandbar__logo{font-family:var(--font-display);font-weight:700;font-size:14px;color:var(--white);letter-spacing:.02em}
.brandbar__logo span{color:var(--gold)}
.brandbar__tag{font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.1em}

.screen{padding:36px 32px;flex:1;display:flex;flex-direction:column;animation:fadein .4s ease}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.hidden{display:none !important}

/* MENU */
.menu h1{font-family:var(--font-display);font-size:25px;color:var(--navy);font-weight:700;line-height:1.25;margin-bottom:8px}
.menu h1 em{color:var(--gold);font-style:italic}
.menu p.lead{font-size:13.5px;color:var(--gray-700);margin-bottom:20px;line-height:1.6}
.field{margin-bottom:18px}
.field label{display:block;font-size:11px;color:var(--gray-400);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.field input{width:100%;padding:12px 14px;border:1px solid var(--gray-100);border-radius:3px;font-family:var(--font-body);font-size:14px;color:var(--navy);outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--gold)}
.cards{display:flex;flex-direction:column;gap:10px}
.card{border:1px solid var(--gray-100);border-radius:4px;padding:16px 18px;cursor:pointer;transition:all .2s;text-align:left;background:var(--white);font-family:var(--font-body)}
.card:hover{border-color:var(--gold);box-shadow:0 6px 20px rgba(28,43,94,.08);transform:translateY(-1px)}
.card__title{font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--navy);margin-bottom:3px}
.card__meta{font-size:11px;color:var(--gray-400);text-transform:uppercase;letter-spacing:.05em}
.card__cats{font-size:12px;color:var(--gray-700);margin-top:6px;line-height:1.5}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 30px;font-family:var(--font-body);font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border:none;border-radius:3px;cursor:pointer;transition:all .2s;background:var(--gold);color:var(--navy)}
.btn:hover{background:var(--gold-light);transform:translateY(-1px)}
.btn--ghost{background:transparent;border:1px solid var(--gray-100);color:var(--gray-700)}
.btn--ghost:hover{border-color:var(--navy);background:transparent;transform:none}
.btn--full{width:100%}
.btn--ans{flex:1;padding:18px;background:var(--off-white);color:var(--navy);border:2px solid var(--gray-100);font-weight:700}
.btn--ans:hover{border-color:var(--gold);background:var(--white);transform:translateY(-1px)}
.back-link{margin-top:auto;padding-top:18px;text-align:center}
.back-link button{background:none;border:none;color:var(--gray-400);font-size:11px;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;font-family:var(--font-body)}
.back-link button:hover{color:var(--navy)}

/* QUIZ */
.quiz{justify-content:space-between}
.progress-wrap{margin-bottom:28px}
.progress-top{display:flex;justify-content:space-between;font-size:11px;color:var(--gray-400);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.progress-bar{height:4px;background:var(--gray-100);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .35s ease}
.q-matrix-tag{font-size:10.5px;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:14px}
.q-text{font-family:var(--font-display);font-size:21px;color:var(--navy);font-weight:600;line-height:1.35;margin-bottom:auto;min-height:110px}
.q-actions{display:flex;flex-direction:column;gap:12px;margin-top:22px}
.q-back{margin-top:16px;text-align:center}
.q-back button{background:none;border:none;color:var(--gray-400);font-size:11px;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;font-family:var(--font-body)}
.q-back button:hover{color:var(--navy)}
.q-back button:disabled{opacity:0;cursor:default}

/* RESULTS */
.res-greet{font-size:12px;color:var(--gray-400);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.res-title{font-family:var(--font-display);font-size:22px;color:var(--navy);font-weight:700;margin-bottom:20px;line-height:1.3}
.bars{margin-bottom:22px}
.brow{margin-bottom:14px}
.brow__top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.brow__name{font-size:12.5px;font-weight:700;color:var(--navy)}
.brow__sub{font-size:10px;color:var(--gray-400);margin-left:6px}
.brow__pct{font-family:var(--font-display);font-weight:700;font-size:14px}
.bbar{height:7px;background:var(--gray-100);border-radius:4px;overflow:hidden}
.bbar__fill{height:100%;width:0%;border-radius:4px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.interp{background:var(--off-white);border-left:3px solid var(--gold);padding:16px 18px;margin-bottom:16px;font-size:13px;line-height:1.65;color:var(--gray-700)}
.results-actions{margin-top:auto;padding-top:18px;display:flex;flex-direction:column;gap:10px}
.proto-note{font-size:10px;color:var(--gray-400);text-align:center;line-height:1.5;margin-top:12px}

@media (max-width:480px){
  body{padding:0;align-items:flex-start}
  .app{min-height:100vh;border-radius:0;max-width:100%}
  .screen{padding:26px 18px}
  .q-text{font-size:19px;min-height:100px}
  .menu h1{font-size:21px}
}
</style>
</head>
<body>
<div class="app" id="app">

  <div class="brandbar">
    <span class="brandbar__logo">mirovozzrenie<span>rosta</span></span>
    <span class="brandbar__tag">Поиск призвания</span>
  </div>

  <!-- MENU -->
  <div class="screen menu" id="screen-menu">
    <h1>Дополнительные <em>матрицы</em></h1>
    <p class="lead">4 новых диагностики. Выбери, какую проверить сейчас — каждая отдельная, проходить все подряд не нужно.</p>
    <div class="field">
      <label for="inp-name">Имя</label>
      <input id="inp-name" type="text" placeholder="Как вас зовут?">
    </div>
    <div class="cards" id="matrix-cards"></div>
  </div>

  <!-- QUIZ -->
  <div class="screen quiz hidden" id="screen-quiz">
    <div class="progress-wrap">
      <div class="q-matrix-tag" id="q-matrix-tag">—</div>
      <div class="progress-top"><span id="progress-label">Вопрос 1 из 50</span><span id="progress-pct">2%</span></div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:2%"></div></div>
    </div>
    <div><div class="q-text" id="q-text">—</div></div>
    <div class="q-actions">
      <button class="btn btn--ans" id="btn-yes">Да</button>
      <button class="btn btn--ans" id="btn-no">Нет</button>
    </div>
    <div class="q-back"><button id="btn-back" disabled>← Назад</button></div>
  </div>

  <!-- RESULTS -->
  <div class="screen hidden" id="screen-results">
    <div class="res-greet" id="res-greet">Персональный профиль</div>
    <div class="res-title" id="res-title">Ваш результат</div>
    <div class="bars" id="bars"></div>
    <div id="interp-block"></div>
    <div class="results-actions">
      <button class="btn btn--ghost btn--full" id="btn-another">Пройти другую матрицу</button>
    </div>
    <p class="proto-note">Прототип для проверки логики и формулировок перед передачей в разработку.</p>
  </div>

</div>

<script>
// ════════════════════════════════════════════════════════════════
// DATA: 4 matrices, each with categories + questions + interpretations
// ════════════════════════════════════════════════════════════════
const MATRICES = {

  radicals: {
    title: "7 Радикалов (ЦНС)",
    threshold: 75,
    cats: {
      hyst:  {name:"Истероидный",        sub:"Эффектность, внимание, образ",          color:"#C9447A"},
      epi:   {name:"Эпилептоидный",      sub:"Контроль, порядок, территория",         color:"#4A5C7A"},
      para:  {name:"Параноидный",        sub:"Сверхидея, миссия",                     color:"#7A3FA0"},
      emo:   {name:"Эмотивный",          sub:"Эмпатия, гармония, эстетика",           color:"#5B8C5A"},
      schiz: {name:"Шизоидный",          sub:"Оригинальность, дистанция от шаблонов", color:"#3E6B9C"},
      hyper: {name:"Гипертимный",        sub:"Энергичность, общительность",           color:"#D2792E"},
      anx:   {name:"Тревожно-мнительный",sub:"Ответственность, дисциплина",           color:"#6B6B6B"},
    },
    order: ["hyst","epi","para","emo","schiz","hyper","anx"],
    questions: [
      {c:"hyst",text:"Мне важно производить яркое впечатление на окружающих."},
      {c:"hyst",text:"Я легко становлюсь центром внимания в компании или на встрече."},
      {c:"hyst",text:"Мне нравится, когда на меня смотрят и оценивают мой результат публично."},
      {c:"hyst",text:"Я подбираю одежду, речь или подачу так, чтобы запомниться."},
      {c:"hyst",text:"Мне важно, чтобы мои достижения были заметны другим, а не только мне самому."},
      {c:"hyst",text:"Я умею эффектно подать даже обычную идею или результат."},
      {c:"hyst",text:"Скука и рутина без признания утомляют меня быстрее, чем сложная задача с аудиторией."},
      {c:"hyst",text:"Мне легко вживаться в новую роль или образ под ситуацию."},
      {c:"hyst",text:"Я чувствую прилив энергии, когда выступаю перед людьми или в центре внимания."},
      {c:"hyst",text:"Мне важно быть тем, кого запомнили, а не просто «одним из»."},

      {c:"epi",text:"Мне важно держать чёткий порядок в своих делах и пространстве."},
      {c:"epi",text:"Я внимательно слежу за тем, что принадлежит мне, и не люблю делиться этим без необходимости."},
      {c:"epi",text:"Мне важно доводить начатое до полного завершения, а не оставлять «почти готово»."},
      {c:"epi",text:"Я подмечаю, если кто-то нарушает установленные мной правила или границы."},
      {c:"epi",text:"Мне комфортно, когда у меня есть прямой контроль над процессом от начала до конца."},
      {c:"epi",text:"Я предпочитаю накопить и сохранить ресурс, а не потратить его на риск."},
      {c:"epi",text:"Мне важно, чтобы все обязательства — мои и чужие — выполнялись точно и в срок."},
      {c:"epi",text:"Я могу быть упорным до упрямства, если считаю свою позицию правильной."},
      {c:"epi",text:"Мне сложно расслабиться, если в моей зоне ответственности что-то не под контролем."},
      {c:"epi",text:"Я ревностно отношусь к тому, что считаю «своим» — проектом, идеей, территорией."},

      {c:"para",text:"У меня есть крупная цель, которой я подчиняю большинство решений."},
      {c:"para",text:"Мне сложно тратить время и силы на то, что не продвигает мою главную идею."},
      {c:"para",text:"Я готов терпеть текущий дискомфорт, если это служит долгосрочной цели."},
      {c:"para",text:"Мне важно, чтобы моя деятельность имела смысл больше, чем просто заработок."},
      {c:"para",text:"Я мысленно возвращаюсь к своей главной цели даже в незначительных повседневных делах."},
      {c:"para",text:"Мне сложно остановиться на полпути, если я верю в идею."},
      {c:"para",text:"Я способен годами двигаться к одной цели, не теряя к ней интереса."},
      {c:"para",text:"Окружающие иногда говорят, что я слишком одержим своей идеей или делом."},
      {c:"para",text:"Мне важно, чтобы моя работа была частью чего-то большего, а не просто набором задач."},
      {c:"para",text:"Я готов идти на конфликт с окружением, если это нужно для главной цели."},

      {c:"emo",text:"Я остро чувствую настроение и эмоции других людей, даже без слов."},
      {c:"emo",text:"Мне физически некомфортно находиться в атмосфере конфликта или агрессии."},
      {c:"emo",text:"Эстетика — то, как что-то выглядит и звучит — имеет для меня самостоятельную ценность."},
      {c:"emo",text:"Я часто принимаю чужую боль или радость близко к сердцу, как свою."},
      {c:"emo",text:"Мне важно создавать вокруг себя гармоничную, не травмирующую атмосферу."},
      {c:"emo",text:"Я легко считываю, когда человек говорит не то, что чувствует на самом деле."},
      {c:"emo",text:"Мне сложно оставаться равнодушным, видя чужие страдания, даже у незнакомых людей."},
      {c:"emo",text:"Я ценю красоту и тонкие детали в обычных вещах — природе, искусстве, отношениях."},
      {c:"emo",text:"Мне важно, чтобы решение было не только правильным, но и человечным."},
      {c:"emo",text:"Резкость или грубость в общении ранит меня сильнее, чем большинство людей вокруг."},

      {c:"schiz",text:"Я часто прихожу к нестандартным выводам там, где другие видят только привычный путь."},
      {c:"schiz",text:"Мне комфортно проводить много времени в одиночестве, обдумывая идеи."},
      {c:"schiz",text:"Я с трудом следую готовым алгоритмам, если вижу более логичный собственный путь."},
      {c:"schiz",text:"Мне интереснее теория и абстрактная идея, чем социальное взаимодействие вокруг неё."},
      {c:"schiz",text:"Я сохраняю внутреннюю дистанцию даже в близком общении."},
      {c:"schiz",text:"Мне сложно объяснить ход своей мысли другим — для меня она самоочевидна."},
      {c:"schiz",text:"Я ценю самобытность своих идей выше их немедленного признания окружающими."},
      {c:"schiz",text:"Мне комфортнее наблюдать за процессом со стороны, чем быть в эпицентре общения."},
      {c:"schiz",text:"Я часто замечаю закономерности или связи, которые другие пропускают."},
      {c:"schiz",text:"Мне важнее внутренняя логика идеи, чем то, насколько она понятна большинству."},

      {c:"hyper",text:"Я легко завожу новые знакомства и быстро чувствую себя своим в новой компании."},
      {c:"hyper",text:"У меня обычно высокий уровень энергии, даже когда задач много."},
      {c:"hyper",text:"Я склонен видеть позитивную сторону даже в сложной ситуации."},
      {c:"hyper",text:"Мне быстро становится скучно, если ничего не меняется и не происходит."},
      {c:"hyper",text:"Я легко переключаюсь между разными делами и людьми в течение дня."},
      {c:"hyper",text:"Неудача редко выбивает меня надолго — я быстро возвращаюсь в рабочий тонус."},
      {c:"hyper",text:"Мне нравится начинать новое, даже если предыдущее не полностью завершено."},
      {c:"hyper",text:"Я заряжаю энергией окружающих своим настроением."},
      {c:"hyper",text:"Мне сложно долго сидеть в одном, медленном, монотонном режиме."},
      {c:"hyper",text:"Новые люди и места вызывают у меня скорее интерес, чем тревогу."},

      {c:"anx",text:"Я заранее продумываю, что может пойти не так, прежде чем начать дело."},
      {c:"anx",text:"Мне важно несколько раз проверить работу, прежде чем сказать, что она готова."},
      {c:"anx",text:"Я чувствую сильное напряжение, если беру на себя обязательство, в котором не до конца уверен."},
      {c:"anx",text:"Мне важно соответствовать ожиданиям — своим и чужим — даже в мелких деталях."},
      {c:"anx",text:"Я склонен готовиться к худшему сценарию, чтобы не оказаться врасплох."},
      {c:"anx",text:"Чужое недовольство мной я переживаю дольше, чем хотел бы."},
      {c:"anx",text:"Мне важно делать всё добросовестно, даже если это не будет замечено."},
      {c:"anx",text:"Я долго взвешиваю решение, если есть риск ошибиться."},
      {c:"anx",text:"Мне сложно расслабиться, пока не закрыты все важные обязательства."},
      {c:"anx",text:"Я чувствую ответственность за результат даже в ситуациях, где формально не обязан."},
    ],
    interp: {
      hyst: `Ваш результат — <b>{pct}%</b> — заметно превышает порог выраженности. Потребность производить впечатление и быть на виду — не просто черта, а то, что заряжает вас энергией в работе.<br><br>Истероидный радикал мотивирован вниманием и признанием здесь и сейчас. Вам комфортнее там, где результат виден публично: выступления, продажи, медиа, представительские роли, любая работа с аудиторией.`,
      epi: `Ваш результат — <b>{pct}%</b> — заметно превышает порог выраженности. Контроль, порядок и доведение дел до полного завершения — то, на чём держится ваша надёжность.<br><br>Эпилептоидный радикал мотивирован владением процессом от начала до конца. Вам комфортнее там, где есть чёткая зона ответственности и можно довести дело до результата без чужого вмешательства: операционное управление, контроль качества, администрирование.`,

      {c:"pow",text:"Мне важно, чтобы статус и влияние со временем росли, а не оставались на месте."},
      {c:"pow",text:"Я склонен брать на себя роль лидера в новой группе, даже если меня не просили."},
      {c:"pow",text:"Мне важно, чтобы у меня было больше возможностей влиять на ситуацию, чем у среднего участника."},
      {c:"pow",text:"Я чувствую удовлетворение, когда вижу, что моё решение изменило ход событий."},
      {c:"pow",text:"Контроль над ресурсами (бюджет, люди, информация) для меня — естественная цель, а не побочный эффект."},
      {c:"pow",text:"Мне важно, чтобы окружающие признавали моё право принимать решения в моей зоне."},
    ],
    interp: {
      ach: `Потребность в достижении — <b>{pct}%</b> от вашего профиля. Личный рекорд и измеримый результат мотивируют вас сильнее, чем похвала или статус.<br><br>Вам подходят задачи средней сложности с понятным результатом и регулярной обратной связью о прогрессе.`,
      aff: `Потребность в принадлежности — <b>{pct}%</b> от вашего профиля. Качество отношений и ощущение «своего круга» значат для вас не меньше, чем результат работы.<br><br>Вам подходит среда с регулярным человеческим контактом и тёплыми отношениями в команде.`,
      pow: `Потребность во влиянии — <b>{pct}%</b> от вашего профиля. Возможность определять, что будет дальше, мотивирует вас сильнее, чем личное участие в исполнении.<br><br>Вам подходят позиции, где ваше решение влияет на ход событий для группы людей.`,
    },
  },
};

// ════════════════════════════════════════════════════════════════
// ENGINE
// ════════════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
let currentKey = null, order = [], idx = 0, answers = [];

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

function buildMenu(){
  const wrap = $("matrix-cards");
  wrap.innerHTML = Object.keys(MATRICES).map(key=>{
    const m = MATRICES[key];
    const catNames = m.order.map(c=>m.cats[c].name).join(" · ");
    const mins = Math.round(m.questions.length / 7);
    return `<button class="card" data-key="${key}">
      <div class="card__title">${m.title}</div>
      <div class="card__meta">${m.questions.length} вопросов · ~${mins} мин</div>
      <div class="card__cats">${catNames}</div>
    </button>`;
  }).join("");
  wrap.querySelectorAll(".card").forEach(btn=>{
    btn.addEventListener("click", ()=>startQuiz(btn.dataset.key));
  });
}

function startQuiz(key){
  currentKey = key;
  const m = MATRICES[key];
  order = shuffle(m.questions);
  idx = 0;
  answers = new Array(order.length).fill(null);
  $("screen-menu").classList.add("hidden");
  $("screen-quiz").classList.remove("hidden");
  $("q-matrix-tag").textContent = m.title;
  renderQuestion();
}

function renderQuestion(){
  const total = order.length;
  $("q-text").textContent = order[idx].text;
  $("progress-label").textContent = `Вопрос ${idx+1} из ${total}`;
  const pct = Math.round((idx/total)*100);
  $("progress-pct").textContent = pct + "%";
  $("progress-fill").style.width = pct + "%";
  $("btn-back").disabled = idx === 0;
}

function answer(val){
  answers[idx] = val;
  if(idx < order.length - 1){ idx++; renderQuestion(); }
  else { finishQuiz(); }
}
function goBack(){ if(idx>0){ idx--; renderQuestion(); } }

function finishQuiz(){
  const m = MATRICES[currentKey];
  const sums = {};
  m.order.forEach(c=> sums[c]=0);
  order.forEach((q,i)=>{ if(answers[i]) sums[q.c]++; });
  const totalPerCat = order.length / m.order.length; // 10 in all current matrices
  const pct = {};
  m.order.forEach(c=> pct[c] = Math.round((sums[c]/totalPerCat)*100));

  const sorted = m.order.slice().sort((a,b)=>pct[b]-pct[a]);
  const top = sorted[0], second = sorted[1];

  $("screen-quiz").classList.add("hidden");
  $("screen-results").classList.remove("hidden");
  const name = $("inp-name").value.trim();
  $("res-greet").textContent = (name ? `${name} · ` : "") + m.title;

  let titleHTML, interpHTML;
  if(m.threshold){
    const above = m.order.filter(c=>pct[c] > m.threshold);
    if(above.length >= 2){
      const a=above[0], b=above[1];
      titleHTML = `Комбинированный профиль: ${m.cats[a].name} + ${m.cats[b].name}`;
      interpHTML = `<div class="interp">${m.interp[a].replace("{pct}",pct[a])}</div>
                    <div class="interp"><strong>Также ярко выражено:</strong><br><br>${m.interp[b].replace("{pct}",pct[b])}</div>`;
    } else if(above.length === 1){
      const a=above[0];
      titleHTML = `Ведущий профиль: ${m.cats[a].name}`;
      interpHTML = `<div class="interp">${m.interp[a].replace("{pct}",pct[a])}</div>`;
    } else {
      titleHTML = `Профиль выражен умеренно`;
      interpHTML = `<div class="interp">Ни одна категория не превысила порог выраженности (${m.threshold}%). Ближе всего к вам по результату: <strong>${m.cats[top].name} (${pct[top]}%)</strong>.</div>`;
    }
  } else {
    titleHTML = `Ведущий профиль: ${m.cats[top].name}`;
    interpHTML = `<div class="interp">${m.interp[top].replace("{pct}",pct[top])}</div>`;
    if(pct[second] >= pct[top]-15){
      interpHTML += `<div class="interp"><strong>Близко по значению:</strong><br><br>${m.interp[second].replace("{pct}",pct[second])}</div>`;
    }
  }

  $("res-title").innerHTML = titleHTML;
  $("interp-block").innerHTML = interpHTML;

  const barsEl = $("bars");
  barsEl.innerHTML = m.order.map(c=>`
    <div class="brow">
      <div class="brow__top">
        <div><span class="brow__name">${m.cats[c].name}</span><span class="brow__sub">${m.cats[c].sub}</span></div>
        <span class="brow__pct" style="color:${m.cats[c].color}">${pct[c]}%</span>
      </div>
      <div class="bbar"><div class="bbar__fill" id="bar-${c}" style="background:${m.cats[c].color}"></div></div>
    </div>
  `).join("");

  requestAnimationFrame(()=>{
    setTimeout(()=>{
      m.order.forEach((c,i)=>{
        setTimeout(()=>{ const el=$("bar-"+c); if(el) el.style.width = pct[c]+"%"; }, i*100);
      });
    }, 80);
  });
}

function backToMenu(){
  $("screen-results").classList.add("hidden");
  $("screen-quiz").classList.add("hidden");
  $("screen-menu").classList.remove("hidden");
}

buildMenu();
$("btn-yes").addEventListener("click", ()=>answer(true));
$("btn-no").addEventListener("click", ()=>answer(false));
$("btn-back").addEventListener("click", goBack);
$("btn-another").addEventListener("click", backToMenu);

document.addEventListener("keydown", (e)=>{
  if($("screen-quiz").classList.contains("hidden")) return;
  if(e.key === "ArrowLeft" || e.key === "1") answer(true);
  if(e.key === "ArrowRight" || e.key === "0") answer(false);
});
</script>
</body>
</html>
